service: notes-api

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    TABLE_NAME: table
    IMAGE_BUCKET: notes-app-images-patrick-hwang

  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Scan
      Resource:
        - arn:aws:dynamodb:us-east-1:*:table/table

    - Effect: Allow
      Action:
        - s3:PutObject
        - s3:GetObject
      Resource:
        - arn:aws:s3:::notes-app-images-patrick-hwang/*

functions:
  list_notes:
    handler: src/list_notes.handler
    events:
      - http:
          path: notes
          method: get

  create_note:
    handler: src/create_note.handler
    events:
      - http:
          path: notes
          method: post

  get_note:
    handler: src/get_note.handler
    events:
      - http:
          path: notes/{id}
          method: get

  delete_note:
    handler: src/delete_note.handler
    events:
      - http:
          path: notes/{id}
          method: delete

  update_note:
    handler: src/update_note.handler
    events:
      - http:
          path: notes/{id}
          method: PUT
          
  presign_image_upload:
    handler: src/presign_image_upload.handler
    events:
      - http:
          path: notes/{id}/images/presign
          method: post
          


resources:
  Resources:
    NotesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: table
        AttributeDefinitions:
          - AttributeName: noteId
            AttributeType: S
        KeySchema:
          - AttributeName: noteId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST